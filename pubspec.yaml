name: password_manager
description: Local-First Password Manager — Secure Vault for Android.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.4

dependencies:
  flutter:
    sdk: flutter

  # ── Internationalisation (i18n) ───────────────────────────────
  flutter_localizations:
    sdk: flutter

  # ── State Management ──────────────────────────────────────────
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.3.5

  # ── Immutable Models ──────────────────────────────────────────
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0

  # ── Dependency Injection ──────────────────────────────────────
  get_it: ^8.0.3
  injectable: ^2.5.0

  # ── Navigation ────────────────────────────────────────────────
  go_router: ^14.8.1

  # ── Database (Drift / SQLite) ─────────────────────────────────
  drift: ^2.23.1
  drift_flutter: ^0.2.4

  # ── Secure Storage (Android Keystore) ────────────────────────
  flutter_secure_storage: ^9.2.2

  # ── Cryptography (AES-256-GCM + Argon2id) ────────────────────
  cryptography: ^2.7.0

  # ── Biometrics ────────────────────────────────────────────────
  local_auth: ^2.3.0

  # ── Screen Security (FLAG_SECURE) ────────────────────────────

  # ── Utilities ─────────────────────────────────────────────────
  uuid: ^4.5.1
  equatable: ^2.0.7
  crypto: ^3.0.0   # SHA-1 k-Anonymity (HaveIBeenPwned) en SecurityAuditService
  path_provider: ^2.1.5
  path: ^1.9.1
  intl: ^0.20.2
  screen_protector: ^1.5.1
  otp: ^3.2.0
  share_plus: ^12.0.2
  file_picker: ^10.3.10
  mobile_scanner: ^7.2.0

  # ── Desktop & Sync & P2P ──────────────────────────────────────
  window_manager: ^0.3.9
  tray_manager: ^0.2.1
  nsd: ^5.0.0
  shelf: ^1.4.1
  shelf_web_socket: ^2.0.0
  shelf_router: ^1.1.4
  context_menus: ^1.0.1
  qr_flutter: ^4.1.0
  web_socket_channel: ^3.0.3
  desktop_drop: ^0.5.0

  # ── Native Notifications & Background Services ─────────────────
  flutter_local_notifications: ^20.1.0
  local_notifier: ^0.1.6
  workmanager: ^0.9.0+3
  launch_at_startup: ^0.5.1
  hotkey_manager: ^0.2.3
  windows_single_instance: ^1.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  # ── Code Generation ───────────────────────────────────────────
  build_runner: ^2.4.15
  freezed: ^2.5.7
  json_serializable: ^6.9.0
  riverpod_generator: ^2.4.3
  injectable_generator: ^2.6.2
  drift_dev: ^2.23.1

  # ── Linting ───────────────────────────────────────────────────
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true
  generate: true
  assets:
    - assets/logo/

  # Tipografia bundleada offline (sin red, coherente con local-first).
  # Variable fonts: Flutter mapea fontWeight al eje `wght` del .ttf.
  fonts:
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter.ttf
    - family: JetBrains Mono
      fonts:
        - asset: assets/fonts/JetBrainsMono.ttf

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/logo/solokey_icon.png"
  adaptive_icon_background: "#0E0E13"
  adaptive_icon_foreground: "assets/logo/solokey_adaptive_fg.png"
  min_sdk_android: 21
  # Windows: el .ico del runner (windows/runner/resources/app_icon.ico) se genera
  # MANUALMENTE multi-tamano (16,24,32,48,64,128,256). El plugin con icon_size:256
  # solo metia UN frame 256, por lo que el icono salia en blanco en la barra de
  # titulo y la barra de tareas. Por eso aqui generate:false y no lo tocamos.
  windows:
    generate: false
